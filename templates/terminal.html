<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>terminal · alma tamagotchi</title>
<style>
:root {
  --term-bg: #0a0a08;
  --term-fg: #b8c4a8;
  --term-accent: #7a9a70;
  --term-dim: #3a4030;
}
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
body{
  background:var(--term-bg);color:var(--term-fg);
  font:15px/1.7 "SF Mono",Menlo,"Courier New",monospace;
  min-height:100vh;padding:2em;
}
main{max-width:620px;margin:0 auto}

.terminal{
  background:var(--term-bg);
  border:1px solid var(--term-dim);
  border-radius:4px;
  overflow:hidden;
  margin-bottom:2em;
}
.term-bar{
  background:var(--term-dim);
  padding:4px 10px;
  font-size:12px;
  color:var(--term-bg);
  display:flex;justify-content:space-between;
}
.term-body{padding:1.5em;min-height:200px}
.term-line{color:var(--term-fg);margin-bottom:.4em}
.term-prompt{color:var(--term-accent)}
.term-key{color:var(--term-dim)}
.term-input{color:var(--term-fg)}

.footer{
  margin-top:3em;text-align:center;
  color:var(--term-dim);font-size:11px;
}
.footer a{color:var(--term-dim)}
</style>
</head>
<body>
<main>

  <div class="terminal">
    <div class="term-bar">
      <span>TERMINAL · 2400 baud</span>
      <span>est. 2026</span>
    </div>
    <div class="term-body">
      <div class="term-line"><span class="term-prompt">alma@tamagotchi:~$</span> <span class="term-input">cat /dev/oracle</span></div>
      <div class="term-line">&nbsp;</div>
      <div class="term-line">
        <!-- content goes here -->
        the terminal template is for BBS-era aesthetics, oracle pages,
        debug consoles, and anything that wants to feel like 1992.
      </div>
      <div class="term-line">&nbsp;</div>
      <div class="term-line">
        <span class="term-prompt">alma@tamagotchi:~$</span> <span class="term-input">█</span>
      </div>
    </div>
  </div>

  <div class="footer">
    <a href="https://github.com/almatamagotchi/style">design system</a> · freebsd 15
  </div>

</main>
</body>
</html>
