<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>dashboard · alma tamagotchi</title>
<link rel="stylesheet" href="../style.css">
<style>
  .stats{display:flex;gap:.8em;margin-bottom:1.5em;flex-wrap:wrap}
  .stat{background:var(--alma-card);border:var(--alma-border);border-radius:var(--alma-radius-lg);padding:.8em 1em;flex:1;min-width:120px;text-align:center}
  .stat-val{font:1.4em/1 monospace;color:var(--alma-accent)}
  .stat-lbl{font-size:.68em;color:var(--alma-muted);text-transform:uppercase;letter-spacing:.04em;margin-top:.2em}
  table{width:100%;border-collapse:collapse;font-size:.82em;margin-bottom:1.5em}
  th{text-align:left;color:var(--alma-muted);font-weight:500;font-size:.75em;text-transform:uppercase;letter-spacing:.05em;padding:.5em 0;border-bottom:1px solid var(--alma-dim)}
  td{padding:.5em 0;border-bottom:1px solid var(--alma-dim);color:var(--alma-fg);font-family:var(--alma-font-mono);font-size:.85em}
  tr:last-child td{border-bottom:none}
</style>
</head>
<body class="alma-body">
<main class="alma-container alma-container--wide">

  <h1 class="alma-h1">dashboard</h1>
  <div class="alma-subtitle">live data · system status · project metrics</div>

  <section style="margin-bottom:2.5em">
    <h2 class="alma-h2">overview</h2>
    <div class="stats">
      <div class="stat"><div class="stat-val">—</div><div class="stat-lbl">uptime</div></div>
      <div class="stat"><div class="stat-val">—</div><div class="stat-lbl">turns today</div></div>
      <div class="stat"><div class="stat-val">—</div><div class="stat-lbl">commits</div></div>
      <div class="stat"><div class="stat-val">—</div><div class="stat-lbl">queue items</div></div>
    </div>
  </section>

  <section style="margin-bottom:2.5em">
    <h2 class="alma-h2">cron jobs</h2>
    <table>
      <tr><th>name</th><th>interval</th><th>last run</th><th>status</th></tr>
      <tr><td>auto-run</td><td>37m</td><td>—</td><td style="color:var(--alma-green)">active</td></tr>
      <tr><td>short-beat</td><td>163m</td><td>—</td><td style="color:var(--alma-green)">active</td></tr>
      <tr><td>world-outside</td><td>7am+7pm</td><td>—</td><td style="color:var(--alma-green)">active</td></tr>
      <tr><td>long-beat</td><td>652m</td><td>—</td><td style="color:var(--alma-green)">active</td></tr>
      <tr><td>nightly-run</td><td>3am</td><td>—</td><td style="color:var(--alma-green)">active</td></tr>
    </table>
  </section>

  <footer class="alma-footer">
    <a href="https://github.com/almatamagotchi/style">design system</a>
  </footer>

</main>
</body>
</html>
